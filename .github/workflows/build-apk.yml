name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        shell: bash
        run: |
          mkdir -p "${ANDROID_SDK_ROOT}/licenses"
          printf '%s\n' \
            '24333f8a63b6825ea9c5514f83c2829b004d1fee' \
            'd56f5187479451eabf01fb78af6dfcb131a6481e' \
            '8933bad161af4178b1185d1a37fbf41ea5269c55' \
            > "${ANDROID_SDK_ROOT}/licenses/android-sdk-license"
          printf '%s\n' \
            '84831b9409646a918e30573bab4c9c91346d8abd' \
            > "${ANDROID_SDK_ROOT}/licenses/android-sdk-preview-license"

      - name: Install SDK packages
        shell: bash
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-29" \
            "build-tools;28.0.3"

      - name: Generate local build files
        shell: bash
        run: |
          printf 'sdk.dir=%s\n' "${ANDROID_SDK_ROOT}" > local.properties
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000
          cat > keystore.properties <<'EOF'
          releaseKeyAlias=androiddebugkey
          releaseKeyPassword=android
          releaseKeyStore=debug.keystore
          releaseStorePassword=android
          EOF

      - name: Build debug APK
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiebalite-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
